repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files        # Prevent committing large files
      - id: check-yaml               # Check YAML syntax (excluding Helm charts)
        exclude: ^helm/

  - repo: https://github.com/pycqa/isort               # Sort imports in Python files
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/bandit               # Check for security issues
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["--exclude", "tests"]

  - repo: https://github.com/Yelp/detect-secrets        # Prevent committing secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/astral-sh/ruff-pre-commit  # Check code style
    rev: v0.8.6
    hooks:
      - id: ruff